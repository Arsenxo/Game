<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Обвал</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0b0f1a; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; touch-action:none; }
  #c { position:fixed; inset:0; display:block; touch-action:none; }
  #hud { position:fixed; top:14px; left:14px; right:14px; display:flex; justify-content:space-between; color:#fff; font-weight:800; text-shadow:0 2px 6px rgba(0,0,0,0.6); z-index:5; pointer-events:none; font-size:15px; }
  #hud .big { font-size:22px; }
  #overlay { position:fixed; inset:0; background:rgba(8,8,16,0.88); display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; text-align:center; padding:28px; z-index:10; }
  #overlay h1 { font-size:30px; margin-bottom:6px; background:linear-gradient(90deg,#ff9a5a,#ffd93d); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  #overlay p { font-size:14px; opacity:0.8; line-height:1.55; margin-bottom:22px; max-width:280px; }
  .stat { font-size:13px; opacity:0.75; margin-bottom:2px; }
  .scoreBig { font-size:46px; font-weight:800; color:#ffd93d; margin-bottom:6px; }
  button { background:linear-gradient(135deg,#ff7a59,#ff5470); color:#fff; border:none; border-radius:14px; padding:16px 38px; font-size:17px; font-weight:800; box-shadow:0 8px 24px rgba(255,90,90,0.35); }
  button:active { transform:scale(0.96); }
  #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; color:#888; font-size:14px; z-index:20; }
</style>
</head>
<body>
<div id="loading">Загрузка движка…</div>
<canvas id="c"></canvas>
<div id="hud" style="display:none">
  <div>📏 <span class="big" id="dist">0</span>м</div>
  <div>📦 <span class="big" id="crates">0</span></div>
  <div>⚡ <span class="big" id="spd">0</span></div>
</div>
<div id="overlay" style="display:none">
  <h1>🚗💥 ОБВАЛ</h1>
  <p>Веди пальцем по экрану влево/вправо, чтобы рулить.<br>
  Дроби <b>деревянные ящики</b> на скорости — они разлетаются в щепки.<br>
  <b>Бетонные блоки</b> не трогай — это конец заезда.</p>
  <button id="startBtn">Поехали</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.128.0/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
<script>
const loading = document.getElementById('loading');
const overlay = document.getElementById('overlay');
const hud = document.getElementById('hud');
const startBtn = document.getElementById('startBtn');
const distEl = document.getElementById('dist');
const cratesEl = document.getElementById('crates');
const spdEl = document.getElementById('spd');

const canvas = document.getElementById('c');

function boot() {
  if (typeof THREE === 'undefined' || typeof CANNON === 'undefined') {
    loading.textContent = 'Не удалось загрузить движок. Проверь интернет-соединение и обнови страницу.';
    loading.style.display = 'flex';
    return;
  }

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
const SKY = 0x6fb6d6;
scene.background = new THREE.Color(SKY);
scene.fog = new THREE.Fog(SKY, 18, 70);

const camera = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.1, 200);

function resize() {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(8, 14, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left = -20; sun.shadow.camera.right = 20;
sun.shadow.camera.top = 20; sun.shadow.camera.bottom = -20;
scene.add(sun);

const world = new CANNON.World();
world.gravity.set(0,-18,0);
world.broadphase = new CANNON.SAPBroadphase(world);

const groundBody = new CANNON.Body({ mass:0, shape:new CANNON.Plane() });
groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
world.addBody(groundBody);

const ROAD_HALF = 4.0;

const TILE_LEN = 16, TILE_COUNT = 10;
const tiles = [];
const roadMat = new THREE.MeshStandardMaterial({ color:0x4a4f5c, flatShading:true });
const grassMat = new THREE.MeshStandardMaterial({ color:0x4a8f4a, flatShading:true });
for (let i=0;i<TILE_COUNT;i++){
  const g = new THREE.Group();
  const road = new THREE.Mesh(new THREE.BoxGeometry(ROAD_HALF*2, 0.4, TILE_LEN), roadMat);
  road.position.y = -0.2;
  road.receiveShadow = true;
  g.add(road);
  const grassL = new THREE.Mesh(new THREE.BoxGeometry(6, 0.3, TILE_LEN), grassMat);
  grassL.position.set(-ROAD_HALF-3, -0.25, 0);
  g.add(grassL);
  const grassR = grassL.clone();
  grassR.position.x = ROAD_HALF+3;
  g.add(grassR);
  for (let s=-1;s<=1;s+=2) {
    const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.42, TILE_LEN*0.4), new THREE.MeshStandardMaterial({color:0xffe88a}));
    stripe.position.set(s*ROAD_HALF*0.5, -0.18, 0);
    g.add(stripe);
  }
  g.position.z = -i*TILE_LEN;
  scene.add(g);
  tiles.push(g);
}

const crateMat = new THREE.MeshStandardMaterial({ color:0xd98b3e, flatShading:true });
const barrierMat = new THREE.MeshStandardMaterial({ color:0xb33b3b, flatShading:true });
const debrisMat = new THREE.MeshStandardMaterial({ color:0xb5712f, flatShading:true });

const carGroup = new THREE.Group();
const carBody3D = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.55, 2.6), new THREE.MeshStandardMaterial({color:0x4fd16f, flatShading:true}));
carBody3D.position.y = 0.35;
carBody3D.castShadow = true;
carGroup.add(carBody3D);
const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.45, 1.2), new THREE.MeshStandardMaterial({color:0xbfe9ff, flatShading:true, transparent:true, opacity:0.85}));
cabin.position.set(0, 0.78, -0.1);
cabin.castShadow = true;
carGroup.add(cabin);
const wheelGeo = new THREE.CylinderGeometry(0.32,0.32,0.3,12);
const wheelMat = new THREE.MeshStandardMaterial({ color:0x222222, flatShading:true });
const wheels = [];
[[-0.78,0.05,0.85],[0.78,0.05,0.85],[-0.78,0.05,-0.85],[0.78,0.05,-0.85]].forEach(p=>{
  const w = new THREE.Mesh(wheelGeo, wheelMat);
  w.rotation.z = Math.PI/2;
  w.position.set(p[0],p[1],p[2]);
  w.castShadow = true;
  carGroup.add(w);
  wheels.push(w);
});
scene.add(carGroup);

const carShape = new CANNON.Box(new CANNON.Vec3(0.75, 0.4, 1.3));
const carBody = new CANNON.Body({ mass:1, shape:carShape, position:new CANNON.Vec3(0,0.6,0), linearDamping:0.05 });
carBody.fixedRotation = true;
carBody.updateMassProperties();
world.addBody(carBody);

let running = false;
let speed = 0;
const MAX_SPEED = 26, ACCEL = 0.9;
let steerTarget = 0;
let cratesDestroyed = 0;
let shake = 0;
let spawnZ = -20;
let lastTime = 0;

const obstacles = [];
const debris = [];

function spawnObstacleRow() {
  const x = (Math.random()*2-1) * (ROAD_HALF - 1.1);
  const isBarrier = Math.random() < 0.28;
  let mesh, body;
  if (isBarrier) {
    mesh = new THREE.Mesh(new THREE.BoxGeometry(1.6,1.0,1.0), barrierMat);
    mesh.castShadow = true;
    body = new CANNON.Body({ mass:0, shape:new CANNON.Box(new CANNON.Vec3(0.8,0.5,0.5)) });
  } else {
    mesh = new THREE.Mesh(new THREE.BoxGeometry(1.3,1.3,1.3), crateMat);
    mesh.castShadow = true;
    body = new CANNON.Body({ mass:0, shape:new CANNON.Box(new CANNON.Vec3(0.65,0.65,0.65)) });
  }
  body.position.set(x, isBarrier?0.5:0.65, spawnZ);
  mesh.position.copy(body.position);
  scene.add(mesh);
  world.addBody(body);
  const entry = { body, mesh, type: isBarrier?'barrier':'crate', hit:false };
  body.addEventListener('collide', function(e){ onCollide(entry); });
  obstacles.push(entry);
  spawnZ -= 7 + Math.random()*6;
}

function onCollide(entry) {
  if (!running || entry.hit) return;
  entry.hit = true;
  if (entry.type === 'crate') {
    breakCrate(entry);
    cratesDestroyed++;
    speed = Math.max(speed*0.82, speed-3);
    shake = Math.max(shake, 0.4);
  } else {
    shake = Math.max(shake, 1.6);
    carBody.fixedRotation = false;
    carBody.angularVelocity.set((Math.random()-0.5)*6, (Math.random()-0.5)*4, (Math.random()-0.5)*6);
    carBody.velocity.scale(0.3, carBody.velocity);
    setTimeout(function(){ endGame(); }, 550);
  }
}

function breakCrate(entry) {
  scene.remove(entry.mesh);
  world.removeBody(entry.body);
  const pos = entry.body.position;
  for (let i=0;i<6;i++){
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.42,0.42,0.42), debrisMat);
    m.castShadow = true;
    scene.add(m);
    const b = new CANNON.Body({ mass:0.25, shape:new CANNON.Box(new CANNON.Vec3(0.21,0.21,0.21)) });
    b.position.set(pos.x + (Math.random()-0.5)*0.4, pos.y + (Math.random()-0.5)*0.4, pos.z + (Math.random()-0.5)*0.4);
    b.velocity.set((Math.random()-0.5)*7, Math.random()*6+2, (Math.random()-0.5)*7 - speed*0.15);
    b.angularVelocity.set((Math.random()-0.5)*10,(Math.random()-0.5)*10,(Math.random()-0.5)*10);
    world.addBody(b);
    debris.push({ body:b, mesh:m, born:performance.now() });
  }
  const flash = new THREE.PointLight(0xffd27a, 4, 6);
  flash.position.copy(pos);
  scene.add(flash);
  setTimeout(function(){ scene.remove(flash); }, 120);
}

function cleanupBehind() {
  const camZ = carBody.position.z;
  for (let i=obstacles.length-1;i>=0;i--){
    if (obstacles[i].body.position.z > camZ + 8) {
      scene.remove(obstacles[i].mesh);
      world.removeBody(obstacles[i].body);
      obstacles.splice(i,1);
    }
  }
  const now = performance.now();
  for (let i=debris.length-1;i>=0;i--){
    if (now - debris[i].born > 1200) {
      scene.remove(debris[i].mesh);
      world.removeBody(debris[i].body);
      debris.splice(i,1);
    }
  }
}

function recycleTiles() {
  const camZ = carBody.position.z;
  for (const t of tiles) {
    if (t.position.z - camZ > TILE_LEN) {
      t.position.z -= TILE_LEN * TILE_COUNT;
    }
  }
}

let pointerActive = false;
function setSteerFromClientX(clientX) {
  const frac = Math.min(1, Math.max(0, clientX / innerWidth));
  steerTarget = (frac*2-1) * (ROAD_HALF - 0.9);
}
canvas.addEventListener('pointerdown', function(e){ pointerActive = true; setSteerFromClientX(e.clientX); });
canvas.addEventListener('pointermove', function(e){ if (pointerActive) setSteerFromClientX(e.clientX); });
window.addEventListener('pointerup', function(){ pointerActive = false; });
window.addEventListener('keydown', function(e){
  if (e.key === 'ArrowLeft') steerTarget = Math.max(-ROAD_HALF+0.9, carBody.position.x - 1.5);
  if (e.key === 'ArrowRight') steerTarget = Math.min(ROAD_HALF-0.9, carBody.position.x + 1.5);
});

function resetGame() {
  for (const o of obstacles) { scene.remove(o.mesh); world.removeBody(o.body); }
  obstacles.length = 0;
  for (const d of debris) { scene.remove(d.mesh); world.removeBody(d.body); }
  debris.length = 0;
  carBody.position.set(0,0.6,0);
  carBody.velocity.set(0,0,0);
  carBody.angularVelocity.set(0,0,0);
  carBody.quaternion.set(0,0,0,1);
  carBody.fixedRotation = true;
  speed = 0;
  steerTarget = 0;
  cratesDestroyed = 0;
  spawnZ = -20;
  for (let i=0;i<tiles.length;i++) tiles[i].position.z = -i*TILE_LEN;
  for (let i=0;i<14;i++) spawnObstacleRow();
}

function endGame() {
  running = false;
  hud.style.display = 'none';
  overlay.style.display = 'flex';
  overlay.innerHTML =
    '<h1>💥 АВАРИЯ</h1>' +
    '<div class="scoreBig">' + Math.floor(Math.abs(carBody.position.z)) + ' м</div>' +
    '<div class="stat">Ящиков разбито: ' + cratesDestroyed + '</div>' +
    '<p style="margin-top:14px">Бетонный блок — это не ящик, братан 😅</p>' +
    '<button id="restartBtn">Ещё раз</button>';
  document.getElementById('restartBtn').addEventListener('click', startGame);
}

function startGame() {
  overlay.style.display = 'none';
  hud.style.display = 'flex';
  resetGame();
  running = true;
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

startBtn.addEventListener('click', startGame);

const timeStep = 1/60;
function loop(t) {
  if (!running) return;
  const dt = Math.min(0.05, (t-lastTime)/1000);
  lastTime = t;

  if (carBody.fixedRotation !== false) {
    speed = Math.min(MAX_SPEED, speed + ACCEL*dt);
  }
  carBody.velocity.z = -speed;
  if (carBody.fixedRotation) {
    const dx = steerTarget - carBody.position.x;
    carBody.velocity.x = Math.max(-9, Math.min(9, dx*6));
  }

  world.step(timeStep, dt, 3);

  if (carBody.fixedRotation) {
    carBody.position.x = Math.max(-ROAD_HALF+0.85, Math.min(ROAD_HALF-0.85, carBody.position.x));
  }

  carGroup.position.copy(carBody.position);
  carGroup.quaternion.copy(carBody.quaternion);
  carGroup.position.y = carBody.position.y - 0.25;
  const lean = Math.max(-0.25, Math.min(0.25, -carBody.velocity.x*0.025));
  carBody3D.rotation.z = lean;
  cabin.rotation.z = lean;
  wheels.forEach(function(w){ w.rotation.x -= speed*dt*1.6; });

  for (const o of obstacles) { o.mesh.position.copy(o.body.position); o.mesh.quaternion.copy(o.body.quaternion); }
  for (const d of debris) { d.mesh.position.copy(d.body.position); d.mesh.quaternion.copy(d.body.quaternion); }

  while (spawnZ > carBody.position.z - 90) spawnObstacleRow();
  cleanupBehind();
  recycleTiles();

  shake *= 0.88;
  const camOffset = new THREE.Vector3(0, 4.4, 7.5);
  const desired = new THREE.Vector3().copy(carBody.position).add(camOffset);
  camera.position.lerp(desired, 0.14);
  camera.position.x += (Math.random()-0.5)*shake*0.4;
  camera.position.y += (Math.random()-0.5)*shake*0.4;
  camera.lookAt(carBody.position.x*0.5, carBody.position.y+0.8, carBody.position.z-6);

  distEl.textContent = Math.floor(Math.abs(carBody.position.z));
  cratesEl.textContent = cratesDestroyed;
  spdEl.textContent = Math.floor(speed*7);

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

loading.style.display = 'none';
overlay.style.display = 'flex';
}

if (document.readyState === 'complete' || document.readyState === 'interactive') {
  setTimeout(boot, 50);
} else {
  window.addEventListener('DOMContentLoaded', boot);
}
</script>
</body>
</html>
